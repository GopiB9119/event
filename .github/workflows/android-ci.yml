name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Compile, test, and assemble
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Prepare Gradle wrapper
        run: chmod +x gradlew

      - name: Verify debug build
        env:
          JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
        run: >-
          ./gradlew
          --no-daemon
          --no-configuration-cache
          :app:compileDirectDebugKotlin
          :app:compilePlayDebugKotlin
          :app:testDirectDebugUnitTest
          :app:testPlayDebugUnitTest
          :app:assembleDirectDebug
          :app:assemblePlayDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-unit-test-reports
          path: |
            app/build/reports/tests/testDirectDebugUnitTest/
            app/build/test-results/testDirectDebugUnitTest/
            app/build/reports/tests/testPlayDebugUnitTest/
            app/build/test-results/testPlayDebugUnitTest/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: community-ledger-debug-apks
          path: |
            app/build/outputs/apk/direct/debug/app-direct-debug.apk
            app/build/outputs/apk/play/debug/app-play-debug.apk
          if-no-files-found: error
          retention-days: 14